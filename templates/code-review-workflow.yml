# .github/workflows/mra-code-review.yml
# Context-aware code review powered by Claude Code + multi-repo-agent
# Generated by: mra ci <project> --with-review
#
# SECURITY (TM-006):
# - This workflow uses `pull_request` (not `pull_request_target`) so that
#   PR content cannot read repository secrets. DO NOT switch the trigger
#   to `pull_request_target` unless you have fully reviewed every step in
#   `.mra/actions/mra-code-review/action.yml` for injection paths — that
#   trigger exposes ANTHROPIC_API_KEY to fork-PR-controlled code.
# - For fork PRs (`github.event.pull_request.head.repo.fork == true`),
#   `secrets.ANTHROPIC_API_KEY` is unavailable by default; the action
#   will fail early on validation, which is the desired outcome.
# - Required permissions are scoped to the minimum needed to post a
#   review comment. Do not widen them.
name: MRA Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, master, development]

concurrency:
  group: mra-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout multi-repo-agent
        uses: actions/checkout@v4
        with:
          repository: YOUR_ORG/multi-repo-agent
          path: .mra

      - name: Setup workspace
        run: |
          WORKSPACE="$(dirname "${{ github.workspace }}")/workspace"
          mkdir -p "$WORKSPACE/.collab"
          ln -sf "${{ github.workspace }}" "$WORKSPACE/YOUR_PROJECT"

          # Copy dep-graph from mra if available
          if [[ -f .mra/tests/fixtures/dep-graph.json ]]; then
            cp .mra/tests/fixtures/dep-graph.json "$WORKSPACE/.collab/"
          elif [[ -f "${{ github.workspace }}/.collab/dep-graph.json" ]]; then
            cp "${{ github.workspace }}/.collab/dep-graph.json" "$WORKSPACE/.collab/"
          fi

          echo "WORKSPACE=$WORKSPACE" >> "$GITHUB_ENV"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run context-aware code review
        uses: ./.mra/actions/mra-code-review
        with:
          workspace: ${{ env.WORKSPACE }}
          project: YOUR_PROJECT
          mra-path: ${{ github.workspace }}/.mra
          git-org: YOUR_GIT_ORG
          base-ref: ${{ github.event.pull_request.base.ref }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: sonnet
          output-language: YOUR_OUTPUT_LANGUAGE
